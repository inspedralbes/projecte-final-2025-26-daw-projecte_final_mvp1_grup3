name: Deploy to Server via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar al servidor
    runs-on: ubuntu-latest

    steps:
    - name: Executar comandes SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Anar a la carpeta real del projecte
          cd /root/projecte-final-2025-26-daw-projecte_final_mvp1_grup3

          # 2. Actualitzar el codi
          git pull origin main

          # 3. Crear els fitxers .env des dels secrets de GitHub
          echo "${{ secrets.ENV_ARREL }}" > .env
          echo "${{ secrets.ENV_BACKEND }}" > backend-laravel/.env

          # 4. Reconstruir i aixecar contenidors (especificant el fitxer compose)
          docker compose -f docker/docker-compose.yml up -d --build

          # 5. Esperar que la BD estigui llesta i executar manteniment
          sleep 10
          docker exec loopy-laravel php artisan migrate --force
          docker exec loopy-laravel php artisan config:cache
          docker exec loopy-laravel php artisan route:cache

          # 6. Neteja per no omplir el disc
          docker image prune -f

          script: |
          cd /root/projecte-final-2025-26-daw-projecte_final_mvp1_grup3
          
          # 1. Forçar l'obertura de ports des de dins (per si el firewall de la màquina està actiu)
          # Fem servir 'allow' per SSH, Web i Sockets
          sudo ufw allow 22/tcp
          sudo ufw allow 3000/tcp
          sudo ufw allow 8000/tcp
          sudo ufw allow 3001/tcp
          sudo ufw --force enable
          
          # 2. Aturar-ho tot i netejar volums/imatges per evitar el "pantallasso blanc" per cache
          docker compose -f docker/docker-compose.yml down
          
          # 3. Tornar a aixecar des de zero
          docker compose -f docker/docker-compose.yml up -d --build
          
          # 4. Debug: Treure els logs de Nuxt i guardar-los en un fitxer que puguem llegir si cal
          docker logs loopy-nuxt > /root/last_nuxt_logs.txt
          
          # 5. Executar migracions
          sleep 5
          docker exec loopy-laravel php artisan migrate --force
