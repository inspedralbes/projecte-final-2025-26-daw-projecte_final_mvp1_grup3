# Redirigir siempre de HTTP a HTTPS
server {
    listen 80;
    server_name _; 

    # IMPORTANTE: Necesario para que Certbot pueda verificar el dominio durante la creación inicial
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS real
server {
    listen 443 ssl;
    server_name _; 

    # Rutas dentro del contenedor Docker (las mapearemos desde Host donde Certbot lo baja)
    ssl_certificate /etc/letsencrypt/live/loopy.daw.inspedralbes.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loopy.daw.inspedralbes.cat/privkey.pem;
    
    # Opciones de seguridad para SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Frontend (Nuxt)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API (Laravel)
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Handling (Laravel)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend-laravel:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
