# Loopy - Orquestación de microservicios
# Nuxt :3000 | Node :3001 | Laravel :8000 | Adminer :8080 | PostgreSQL :5433 (host)->5432 | Redis :6380 (host)->6379
# Si 5432/6379 están libres, puedes usar "5432:5432" y "6379:6379" para conectar desde el host a postgres/redis.

services:
  postgres:
    image: postgres:16.2-alpine
    container_name: loopy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-loopy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loopy_secret}
      POSTGRES_DB: ${DB_DATABASE:-loopy_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../database/insert.sql:/docker-entrypoint-initdb.d/02-insert.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-loopy} -d ${DB_DATABASE:-loopy_db}" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7.2.4-alpine
    container_name: loopy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-loopy_secret}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-loopy_secret}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-laravel:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: loopy-laravel
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ../backend-laravel:/var/www
      - /var/www/vendor
      - ../database:/var/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: loopy-nginx
    restart: unless-stopped
    ports:
      - "80:80" # Puerto estándar para Certbot validation & redirects HTTP -> HTTPS
      - "443:443" # HTTPS
    volumes:
      - ../backend-laravel:/var/www
      - ./default.conf:/etc/nginx/conf.d/default.conf
      # RUTAS PARA LEER LOS CERTIFICADOS DESDE EL HOST AL DOCKER (Solo lectura):
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend-laravel

  backend-laravel-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: loopy-laravel-worker
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ../backend-laravel:/var/www
      - /var/www/vendor
      - ../database:/var/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "php", "artisan", "habits:redis-worker" ]

  backend-laravel-admin-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: loopy-laravel-admin-worker
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ../backend-laravel:/var/www
      - /var/www/vendor
      - ../database:/var/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "php", "artisan", "admin:redis-worker" ]

  backend-laravel-plantilla-worker:
    # New service for plantilla worker
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: loopy-laravel-plantilla-worker
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_CLIENT: phpredis
    volumes:
      - ../backend-laravel:/var/www
      - /var/www/vendor
      - ../database:/var/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "php", "artisan", "plantilla:redis-worker" ] # Runs the new plantilla worker

  backend-laravel-roulette-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: loopy-laravel-roulette-worker
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ../backend-laravel:/var/www
      - /var/www/vendor
      - ../database:/var/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "php", "artisan", "roulette:redis-worker" ]

  backend-laravel-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.laravel
    container_name: loopy-laravel-scheduler
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ../backend-laravel:/var/www
      - /var/www/vendor
      - ../database:/var/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: [ "php", "artisan", "schedule:work" ]

  backend-node:
    build:
      context: ../backend-node
      dockerfile: ../docker/Dockerfile.node
    container_name: loopy-node
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3001
      LARAVEL_URL: http://backend-laravel:8000
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.nuxt
      args:
        API_URL: ${API_URL:-http://localhost:8000}
        SOCKET_URL: ${SOCKET_URL:-http://localhost:3001}
    container_name: loopy-nuxt
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_PUBLIC_SOCKET_URL: ${SOCKET_URL}
      NUXT_PUBLIC_API_URL: ${API_URL}
      NITRO_PORT: 3000
    depends_on:
      - backend-node
      - backend-laravel

volumes:
  postgres_data:
  redis_data:
  node_modules:
